<!DOCTYPE html>
<html lang="en" class="dark"> <!-- Force dark class for Tailwind -->
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crystal Clean</title>

    <style>
      /* Force global dark mode styles */
      :root {
        color-scheme: dark; /* Signals to browser UI/scrollbars to stay dark */
      }

      body {
        margin: 0;
        padding: 0;
        background-color: #000 !important; /* Absolute black as requested */
        color: #fff !important;
        overflow-x: hidden;
        font-family: 'Poppins', sans-serif; /* Global font requirement */
      }

      h1, h2, h3, h4, h5, h6 {
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-top: 0;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
