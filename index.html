<!DOCTYPE html>
<html lang="en" class="dark"> <!-- Force dark class for Tailwind -->
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crystal Clean</title>
    <meta
      name="description"
      content="Crystal Clean provides premium vehicle detailing, ceramic coating, paint correction, and PPF installation in Okehampton and across Devon."
    />
    <meta name="theme-color" content="#0E0E0E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap"
      />
    </noscript>

    <style>
      /* Force global dark mode styles */
      :root {
        color-scheme: dark; /* Signals to browser UI/scrollbars to stay dark */
      }

      body {
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        font-family: 'Poppins', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; /* Global font requirement */
      }

      h1, h2, h3, h4, h5, h6 {
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-top: 0;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
